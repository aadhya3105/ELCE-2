<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result System</title>
    <link rel="stylesheet" href="assesment1.css">
</head>
<body>

    <div class="container">

    <h2>Student Result System</h2>
    <input type="text" id="name" placeholder="Student name">
    <input type="number" id="Rollno" placeholder="Roll No">
    <input type="number" id="maths" placeholder="Marks in maths">
    <input type="number" id="science" placeholder="Marks in science">
    <input type="number" id="english" placeholder="Marks in english">

    <button onclick="addStudent()">Add Students</button>
    <button onclick="displayStudents()">Display all students<z/button>
    <button onclick="totalMarks()">Total Marks</button>
    <button onclick="averageMarks()">Average Marks</button>
    <button onclick="above80()">Above 80</button>
    <button onclick="failed()">Failed</button>
    <button onclick="totalStudents()">Total Students</button>
     <div id="output"></div>
    <script src="assesment1.js"></script>
</body>
</html>
